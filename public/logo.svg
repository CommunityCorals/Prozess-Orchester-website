<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Neural Network Nodes -->
  <circle cx="15" cy="30" r="4" fill="url(#nodeGradient)"/>
  <circle cx="35" cy="20" r="3" fill="url(#nodeGradient)"/>
  <circle cx="35" cy="40" r="3" fill="url(#nodeGradient)"/>
  <circle cx="55" cy="30" r="4" fill="url(#nodeGradient)"/>
  
  <!-- Connection Lines -->
  <path d="M19,30 L31,22" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.7"/>
  <path d="M19,30 L31,38" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.7"/>
  <path d="M38,22 L51,30" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.7"/>
  <path d="M38,38 L51,30" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Company Text -->
  <text x="70" y="25" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="url(#logoGradient)">
    prozess
  </text>
  <text x="70" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="300" fill="#64748B">
    orchester
  </text>
  
  <!-- Subtle tech accent -->
  <circle cx="165" cy="15" r="1.5" fill="#06B6D4" opacity="0.6"/>
  <circle cx="175" cy="45" r="1.5" fill="#1E40AF" opacity="0.6"/>
  <path d="M165,15 L175,45" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.3"/>
</svg>